stages:

  feature_engineering:
    cmd: python run_feature_engineering.py
    deps:
      - src/data_loader.py
      - src/feature_engineering.py
      - run_feature_engineering.py
      - data/raw/telco_churn.csv
    outs:
      - data/processed/features_temp.csv

  preprocess:
    cmd: python run_preprocess.py
    deps:
      - src/preprocessing.py
      - run_preprocess.py
      - data/processed/features_temp.csv
    outs:
      - data/processed/churn_clean.csv
      - models/scaler.pkl

  train:
    cmd: python src/main.py
    deps:
      - src/main.py
      - src/train.py
      - src/evaluate.py
      - src/tune.py
      - src/revenue_model.py
      - src/shap_analysis.py
      - src/config.py
      - data/processed/churn_clean.csv
    outs:
      - models/best_model.pkl
    metrics:
      - reports/metrics.json:
          cache: false
    plots:
      - reports/roc_curves.png:
          cache: false
      - reports/shap_summary.png:
          cache: false